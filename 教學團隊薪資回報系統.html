<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教學團隊薪資回報系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #d98c73;
    --brand-dark: #c47a60;
    --bg: #f7f3ec;
    --card: #ffffff;
    --text: #5a4d41;
    --text-dark: #3a2f25;
    --muted: #a89880;
    --border: #e8dfd4;
    --admin-accent: #3b5bdb;
    --success: #2f9e44;
    --error: #e03131;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* NAV */
  nav {
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(217,140,115,0.12);
    padding: 14px 24px;
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 16px rgba(90,77,65,0.06);
  }
  .nav-brand { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .nav-icon { background: var(--brand); padding: 8px; border-radius: 14px; color: white; display: flex; align-items: center; transition: transform 0.15s; }
  .nav-icon:active { transform: scale(0.88); }
  .nav-title { font-size: 18px; font-weight: 900; color: var(--text-dark); letter-spacing: -0.5px; }
  .admin-badge { background: #fff0f0; color: var(--error); padding: 5px 14px; border-radius: 50px; font-size: 10px; font-weight: 900; border: 1px solid #ffd0d0; letter-spacing: 2px; text-transform: uppercase; }
  .btn-logout { background: #f1f5f9; border: none; padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 900; color: #64748b; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: color 0.2s; font-family: inherit; }
  .btn-logout:hover { color: var(--error); }
  .nav-right { display: flex; align-items: center; gap: 14px; }

  /* MAIN */
  main { max-width: 860px; margin: 0 auto; padding: 32px 16px; }

  /* LOADING */
  #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 4px solid rgba(217,140,115,0.2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .spinner.sm { width: 24px; height: 24px; border-width: 3px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; font-weight: 900; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }

  /* TOAST */
  #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); z-index: 200; width: 90%; max-width: 440px; padding: 16px 20px; border-radius: 20px; background: white; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 16px 48px rgba(0,0,0,0.14); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
  #toast.success { border: 1.5px solid #b2f2bb; color: var(--success); }
  #toast.error   { border: 1.5px solid #ffc9c9; color: var(--error); }
  #toast.info    { border: 1.5px solid #bac8ff; color: var(--admin-accent); }

  /* CARD */
  .card { background: var(--card); border-radius: 32px; padding: 36px; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(90,77,65,0.06); }

  /* FORM */
  .form-title { font-size: 24px; font-weight: 900; text-align: center; letter-spacing: 2px; text-decoration: underline; text-decoration-color: rgba(217,140,115,0.3); margin-bottom: 32px; text-transform: uppercase; color: var(--text-dark); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 540px) { .grid-2 { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-label { font-size: 10px; font-weight: 900; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding-left: 4px; }
  .field-label.accent { color: var(--brand); }

  select, input[type="date"], input[type="text"], input[type="password"], input[type="number"] {
    width: 100%; padding: 14px 20px; background: #f8f6f2; border: 2px solid var(--border);
    border-radius: 16px; font-family: inherit; font-weight: 700; font-size: 15px;
    color: var(--text-dark); outline: none; transition: border-color 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  select:focus, input:focus { border-color: var(--brand); }

  .hours-box { background: #fcfbf9; padding: 28px; border-radius: 28px; border: 2px dashed rgba(217,140,115,0.35); text-align: center; margin-bottom: 20px; }
  .hours-label { font-size: 11px; font-weight: 900; color: var(--brand); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  #input-hours { font-family: 'DM Mono', monospace; font-size: 72px; font-weight: 500; background: transparent; border: none; border-radius: 0; padding: 0; text-align: center; color: var(--text-dark); width: 100%; }
  #input-hours:focus { border: none; outline: none; }

  .btn-submit { width: 100%; background: var(--brand); color: white; border: none; padding: 20px; border-radius: 24px; font-family: inherit; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 24px rgba(217,140,115,0.35); transition: background 0.2s, transform 0.15s; letter-spacing: 1px; }
  .btn-submit:hover  { background: var(--brand-dark); }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ADMIN */
  .admin-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 14px; background: var(--card); padding: 18px 24px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .month-selector { font-size: 22px; font-weight: 900; background: transparent; border: none; border-radius: 0; padding: 0; color: var(--text-dark); cursor: pointer; font-family: inherit; }
  .month-selector:focus { outline: none; }
  .tab-bar { display: flex; gap: 6px; background: #f1f5f9; padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
  .tab-btn { padding: 8px 16px; border-radius: 12px; font-family: inherit; font-size: 12px; font-weight: 900; cursor: pointer; border: none; background: transparent; color: #64748b; transition: all 0.18s; }
  .tab-btn.active { background: white; color: var(--admin-accent); border: 1px solid #dce4f7; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 540px) { .stats-grid { grid-template-columns: 1fr; } }
  .stat-card { background: var(--card); border-radius: 28px; padding: 28px; border: 1px solid var(--border); border-left: 6px solid var(--admin-accent); }
  .stat-card.dark { background: #1e293b; border-left: 6px solid var(--brand); border-bottom: 6px solid var(--brand); color: white; position: relative; overflow: hidden; }
  .stat-label { font-size: 10px; font-weight: 900; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-label.brand { color: var(--brand); opacity: 1; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 500; color: var(--text-dark); }
  .stat-card.dark .stat-value { color: white; }
  .stat-unit { font-size: 18px; opacity: 0.3; margin-left: 2px; }

  .btn-export { background: white; color: #1e293b; border: none; padding: 12px 22px; border-radius: 16px; font-family: inherit; font-size: 13px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); transition: background 0.2s; }
  .btn-export:hover { background: #eff6ff; }

  .table-wrap { background: var(--card); border-radius: 28px; border: 1px solid var(--border); overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 540px; }
  thead { background: #f8fafc; }
  th { padding: 18px 24px; text-align: left; font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border); }
  th.center, td.center { text-align: center; }
  th.right, td.right { text-align: right; }
  td { padding: 18px 24px; font-size: 14px; font-weight: 700; border-bottom: 1px solid #f1f5f9; color: var(--text-dark); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }
  .badge { background: #eff6ff; color: var(--admin-accent); padding: 4px 10px; border-radius: 8px; border: 1px solid #bfdbfe; font-size: 11px; font-weight: 900; display: inline-block; }
  .hours-pill { color: var(--admin-accent); font-weight: 900; }
  .btn-delete { background: #fff1f2; color: #e03131; border: 1px solid #ffd0d0; padding: 10px; border-radius: 14px; cursor: pointer; display: inline-flex; align-items: center; transition: all 0.15s; }
  .btn-delete:hover { background: #e03131; color: white; }
  .btn-delete:active { transform: scale(0.9); }

  .analysis-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  .analysis-card { background: var(--card); border-radius: 28px; padding: 28px; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.04); transition: border-color 0.2s; }
  .analysis-card:hover { border-color: rgba(217,140,115,0.45); }
  .analysis-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .analysis-icon { background: #eff6ff; padding: 14px; border-radius: 16px; color: var(--admin-accent); display: flex; }
  .analysis-name { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .analysis-sub  { font-size: 12px; color: var(--muted); font-weight: 700; }

  .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
  .list-editor { background: var(--card); border-radius: 24px; padding: 22px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
  .list-editor-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 900; }
  .list-items { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .list-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 12px; font-weight: 700; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #cbd5e1; display: flex; align-items: center; padding: 2px; transition: color 0.15s; }
  .btn-remove:hover { color: var(--error); }
  .list-add-row { display: flex; gap: 8px; }
  .list-add-row input { flex: 1; padding: 8px 12px; font-size: 12px; border-radius: 10px; border: 1.5px solid var(--border); background: #f8f9fa; }
  .btn-add { padding: 8px 12px; border: none; border-radius: 10px; color: white; font-size: 13px; cursor: pointer; display: flex; align-items: center; font-weight: 900; transition: opacity 0.15s; font-family: inherit; }
  .btn-add:hover { opacity: 0.85; }
  .pwd-row { display: flex; gap: 10px; }
  .pwd-row input { flex: 1; }
  .btn-update { background: #1e293b; color: white; border: none; padding: 12px 20px; border-radius: 14px; font-family: inherit; font-size: 13px; font-weight: 900; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .btn-update:hover { background: #334155; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: white; border-radius: 40px; padding: 48px 36px; width: 100%; max-width: 360px; text-align: center; border: 3px solid rgba(217,140,115,0.15); animation: zoomIn 0.2s ease; }
  .modal-title { font-size: 22px; font-weight: 900; color: var(--text-dark); margin-bottom: 28px; letter-spacing: -0.5px; }
  .modal input { text-align: center; font-family: 'DM Mono', monospace; font-size: 36px; letter-spacing: 10px; margin-bottom: 20px; border-radius: 20px; padding: 18px; }
  .modal .btn-submit { font-size: 15px; padding: 16px; border-radius: 20px; letter-spacing: 2px; }
  .btn-cancel { margin-top: 20px; background: none; border: none; font-family: inherit; font-size: 13px; color: #cbd5e1; cursor: pointer; font-weight: 700; text-decoration: underline; }
  .btn-cancel:hover { color: #64748b; }
  .del-modal { border: 3px solid #fff0f0; }
  .del-btn-row { display: flex; gap: 12px; margin-top: 12px; }
  .btn-danger { flex: 1; background: var(--error); color: white; border: none; padding: 16px; border-radius: 20px; font-family: inherit; font-size: 15px; font-weight: 900; cursor: pointer; letter-spacing: 2px; transition: background 0.2s, transform 0.15s; }
  .btn-danger:hover  { background: #c92a2a; }
  .btn-danger:active { transform: scale(0.97); }
  .btn-danger:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-cancel-del { flex: 1; background: #f1f5f9; color: #64748b; border: none; padding: 16px; border-radius: 20px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-cancel-del:hover { background: #e2e8f0; }

  /* FOOTER */
  footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
  .dot-indicator { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.online  { background: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,0.8); }
  .dot.offline { background: #f59e0b; animation: pulse 1.5s infinite; }
  .dot-label { font-size: 10px; font-weight: 900; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
  .footer-admin { font-size: 10px; font-weight: 900; color: #cbd5e1; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: color 0.2s; }
  .footer-admin:hover { color: var(--brand); }

  @keyframes zoomIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .hidden { display: none !important; }
  .empty-row td { text-align: center; color: var(--muted); font-style: italic; padding: 40px; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p class="loading-text">雲端連線中...</p>
</div>

<!-- NAV -->
<nav>
  <div class="nav-brand" id="nav-brand">
    <div class="nav-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
    </div>
    <span class="nav-title">教學團隊管理系統</span>
  </div>
  <div class="nav-right hidden" id="nav-right">
    <span class="admin-badge">Admin Mode</span>
    <button class="btn-logout" id="btn-logout">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      登出後台
    </button>
  </div>
</nav>

<!-- TOAST -->
<div id="toast"></div>

<!-- MAIN -->
<main>
  <!-- 老師填報 -->
  <div id="view-teacher" class="hidden">
    <div class="card">
      <h2 class="form-title">上課回報系統</h2>
      <form id="report-form">
        <div class="grid-2">
          <div class="field">
            <label class="field-label">填報教師</label>
            <select id="f-teacher" required></select>
          </div>
          <div class="field">
            <label class="field-label">上課日期</label>
            <input type="date" id="f-date" required />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="field-label">分校位置</label>
            <select id="f-branch" required></select>
          </div>
          <div class="field">
            <label class="field-label accent">學生名字 (選填)</label>
            <select id="f-student" required></select>
          </div>
        </div>
        <div class="field" style="margin-bottom:20px">
          <label class="field-label">課程項目</label>
          <select id="f-course" required></select>
        </div>
        <div class="hours-box">
          <div class="hours-label">本次上課時數 (小時)</div>
          <input type="number" id="input-hours" step="0.1" min="0.1" placeholder="0.0" required />
        </div>
        <button type="submit" class="btn-submit" id="btn-submit-form">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          確認送出報帳
        </button>
      </form>
    </div>
  </div>

  <!-- 管理員後台 -->
  <div id="view-admin" class="hidden">
    <div class="admin-header">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="background:#3b5bdb;padding:10px;border-radius:16px;display:flex;color:white">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        </div>
        <select id="month-select" class="month-selector"></select>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="records">帳務看板</button>
        <button class="tab-btn" data-tab="analysis">報表分析</button>
        <button class="tab-btn" data-tab="settings">系統設定</button>
      </div>
    </div>

    <div id="tab-records">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">當月累計總時數</div>
          <div class="stat-value" id="total-hours">0.0 <span class="stat-unit">H</span></div>
        </div>
        <div class="stat-card dark">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="stat-label brand">Google Sheets</div>
              <div class="stat-value" id="total-records">0 <span class="stat-unit">筆</span></div>
            </div>
            <button class="btn-export" id="btn-export">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              匯出 CSV
            </button>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="center">日期</th>
              <th>教師</th>
              <th class="center">學生</th>
              <th>內容</th>
              <th class="right">刪除</th>
            </tr>
          </thead>
          <tbody id="records-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-analysis" class="hidden">
      <div class="analysis-grid" id="analysis-grid"></div>
    </div>

    <div id="tab-settings" class="hidden">
      <div class="card" style="margin-bottom:24px">
        <div class="field-label" style="margin-bottom:12px">修改管理密碼</div>
        <div class="pwd-row">
          <input type="text" id="new-pwd" placeholder="輸入新密碼..." />
          <button class="btn-update" id="btn-update-pwd">更新密碼</button>
        </div>
      </div>
      <div class="settings-grid" id="settings-grid"></div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="dot-indicator">
    <div class="dot offline" id="status-dot"></div>
    <span class="dot-label" id="status-label">連線中...</span>
  </div>
  <span class="footer-admin" id="footer-admin-btn">V38.0 • 點此進入後台</span>
</footer>

<!-- PWD MODAL -->
<div class="overlay hidden" id="pwd-modal">
  <div class="modal">
    <div class="modal-title">系統管理驗證</div>
    <input type="password" id="pwd-input" placeholder="•••••" autocomplete="off" />
    <button class="btn-submit" id="btn-verify-pwd">進入後台系統</button><br/>
    <button class="btn-cancel" id="btn-close-pwd">取消</button>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="overlay hidden" id="del-modal">
  <div class="modal del-modal">
    <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#e03131" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div class="modal-title" style="font-size:20px">確定要刪除此筆紀錄？</div>
    <div class="del-btn-row">
      <button class="btn-cancel-del" id="btn-cancel-del">取消</button>
      <button class="btn-danger" id="btn-confirm-del">確定刪除</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzzgOpay-mktBXUtWJCdPwPgXNxiNF_-o_Xnx92erYPKtDMo7eEuGfxExfOt8S430SjDw/exec';

const DEFAULT_CONFIG = {
  branches: ['本部', '家教'],
  teachers: ['林老師', '陳老師'],
  students: ['(不指定)'],
  courses:  ['國中數學', '高中理化'],
  password: '4628666'
};

let config = { ...DEFAULT_CONFIG };
let records = [];
let isAdmin = false;
let clickCount = 0;
let pendingDeleteId = null;
let currentMonth = new Date().toISOString().slice(0, 7);
let activeTab = 'records';

// ── API ───────────────────────────────────────────────────────────────────────
async function apiGet() {
  const res = await fetch(API_URL);
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
  return res.json();
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const data = await apiGet();
    if (data.config) config = { ...DEFAULT_CONFIG, ...data.config };
    if (data.records) records = data.records.filter(r => r && r.id);
    setStatus(true);
  } catch (e) {
    setStatus(false);
    showToast('無法連線至 Google Sheets，請重整頁面', 'error');
  }
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('view-teacher').classList.remove('hidden');
  refreshTeacherForm();
}

function setStatus(online) {
  document.getElementById('status-dot').className = 'dot ' + (online ? 'online' : 'offline');
  document.getElementById('status-label').textContent = online ? 'Google Sheets 已連線' : '連線失敗';
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  const icons = {
    success: '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>',
    error:   '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info:    '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  el.className = type;
  el.innerHTML = (icons[type] || icons.info) + `<span style="flex:1">${msg}</span>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── FORM ──────────────────────────────────────────────────────────────────────
function populateSelect(id, arr) {
  const el = document.getElementById(id);
  const prev = el.value;
  el.innerHTML = (arr || []).map(v => `<option value="${v}">${v}</option>`).join('');
  if ((arr || []).includes(prev)) el.value = prev;
}

function refreshTeacherForm() {
  populateSelect('f-teacher', config.teachers);
  populateSelect('f-branch',  config.branches);
  populateSelect('f-student', config.students);
  populateSelect('f-course',  config.courses);
  const dateEl = document.getElementById('f-date');
  if (!dateEl.value) dateEl.value = new Date().toISOString().split('T')[0];
}

document.getElementById('report-form').addEventListener('submit', async e => {
  e.preventDefault();
  const hours = parseFloat(document.getElementById('input-hours').value);
  if (!hours || hours <= 0) { showToast('請輸入正確的時數', 'error'); return; }

  const btn = document.getElementById('btn-submit-form');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner sm"></div> 上傳中...';

  const rec = {
    id:        genId(),
    date:      document.getElementById('f-date').value,
    teacher:   document.getElementById('f-teacher').value,
    branch:    document.getElementById('f-branch').value,
    student:   document.getElementById('f-student').value,
    course:    document.getElementById('f-course').value,
    hours:     hours.toString(),
    createdAt: new Date().toISOString()
  };

  try {
    await apiPost({ action: 'add', ...rec });
    records.push(rec);
    document.getElementById('input-hours').value = '';
    showToast('報帳成功！已同步至 Google Sheets ✅', 'success');
    setStatus(true);
  } catch (err) {
    showToast('上傳失敗，請檢查網路連線', 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg> 確認送出報帳';
});

// ── ADMIN RENDER ──────────────────────────────────────────────────────────────
function getMonthOptions() {
  const months = new Set(records.map(r => r.date?.slice(0, 7)).filter(Boolean));
  months.add(currentMonth);
  return Array.from(months).sort().reverse();
}

function refreshMonthSelect() {
  const sel = document.getElementById('month-select');
  const opts = getMonthOptions();
  const prev = sel.value || currentMonth;
  sel.innerHTML = opts.map(m => `<option value="${m}">${m}</option>`).join('');
  sel.value = opts.includes(prev) ? prev : opts[0];
  currentMonth = sel.value;
}

function getFiltered() {
  return records.filter(r => r.date?.startsWith(currentMonth)).sort((a, b) => (b.date||'').localeCompare(a.date||''));
}

function renderRecordsTab() {
  const filtered = getFiltered();
  const totalH = filtered.reduce((s, r) => s + (parseFloat(r.hours) || 0), 0);
  document.getElementById('total-hours').innerHTML = `${totalH.toFixed(1)} <span class="stat-unit">H</span>`;
  document.getElementById('total-records').innerHTML = `${records.length} <span class="stat-unit">筆</span>`;

  const tbody = document.getElementById('records-tbody');
  if (!filtered.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="5">本月尚無紀錄</td></tr>`; return; }

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td class="center" style="font-family:'DM Mono',monospace;font-size:13px">${r.date||''}</td>
      <td style="font-size:16px">${r.teacher||''}</td>
      <td class="center"><span class="badge">${r.student||'-'}</span></td>
      <td style="color:var(--muted)">${r.branch||''} • ${r.course||''} <span class="hours-pill">(${r.hours||0}h)</span></td>
      <td class="right"><button class="btn-delete" data-id="${r.id}">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button></td>
    </tr>
  `).join('');

  tbody.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => openDelModal(btn.dataset.id));
  });
}

function renderAnalysisTab() {
  const filtered = getFiltered();
  const map = {};
  filtered.forEach(r => {
    if (!r.branch) return;
    if (!map[r.branch]) map[r.branch] = { total: 0, teachers: new Set() };
    map[r.branch].total += parseFloat(r.hours) || 0;
    map[r.branch].teachers.add(r.teacher);
  });
  const grid = document.getElementById('analysis-grid');
  const entries = Object.entries(map).sort((a, b) => b[1].total - a[1].total);
  if (!entries.length) { grid.innerHTML = '<p style="color:var(--muted);font-weight:700;grid-column:1/-1;text-align:center;padding:40px">本月尚無資料</p>'; return; }
  grid.innerHTML = entries.map(([b, info]) => `
    <div class="analysis-card">
      <div class="analysis-card-header">
        <div class="analysis-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></div>
        <div style="text-align:right">
          <div style="font-size:10px;font-weight:900;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">累計總時數</div>
          <div style="font-family:'DM Mono',monospace;font-size:40px;font-weight:500;color:var(--text-dark)">${info.total.toFixed(1)} <span style="font-size:14px;opacity:.3">h</span></div>
        </div>
      </div>
      <div class="analysis-name">${b}</div>
      <div class="analysis-sub">參與教師：${info.teachers.size} 位</div>
    </div>
  `).join('');
}

function renderSettingsTab() {
  document.getElementById('new-pwd').value = '';
  const grid = document.getElementById('settings-grid');
  const lists = [
    { key: 'teachers', title: '教師名單', color: '#d98c73' },
    { key: 'courses',  title: '課程名單', color: '#8ba082' },
    { key: 'students', title: '學生名單', color: '#3b82f6' },
    { key: 'branches', title: '分校名單', color: '#d98c73' }
  ];
  grid.innerHTML = lists.map(l => `
    <div class="list-editor" data-key="${l.key}">
      <div class="list-editor-title" style="color:${l.color}">${l.title}</div>
      <div class="list-items">
        ${(config[l.key]||[]).map(item => `
          <div class="list-item">
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${item}</span>
            <button class="btn-remove" data-key="${l.key}" data-val="${item}">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        `).join('')}
      </div>
      <div class="list-add-row">
        <input type="text" placeholder="新增..." class="add-input" data-key="${l.key}" />
        <button class="btn-add" style="background:${l.color}" data-key="${l.key}">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', async () => {
      const k = btn.dataset.key;
      config[k] = config[k].filter(x => x !== btn.dataset.val);
      try { await apiPost({ action: 'saveConfig', config }); showToast('名單已更新', 'success'); }
      catch(e) { showToast('儲存失敗', 'error'); }
      renderSettingsTab(); refreshTeacherForm();
    });
  });

  grid.querySelectorAll('.btn-add').forEach(btn => {
    btn.addEventListener('click', async () => {
      const k = btn.dataset.key;
      const input = grid.querySelector(`.add-input[data-key="${k}"]`);
      const val = input.value.trim();
      if (!val) return;
      if (config[k].includes(val)) { showToast('名單中已存在此項目', 'info'); return; }
      config[k] = [...config[k], val];
      try { await apiPost({ action: 'saveConfig', config }); showToast('已新增 ' + val, 'success'); }
      catch(e) { showToast('儲存失敗', 'error'); }
      renderSettingsTab(); refreshTeacherForm();
    });
  });

  grid.querySelectorAll('.add-input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); grid.querySelector(`.btn-add[data-key="${input.dataset.key}"]`).click(); }
    });
  });
}

function renderAdmin() {
  refreshMonthSelect();
  if (activeTab === 'records')  renderRecordsTab();
  if (activeTab === 'analysis') renderAnalysisTab();
  if (activeTab === 'settings') renderSettingsTab();
}

// ── VIEW SWITCH ───────────────────────────────────────────────────────────────
function showTeacher() {
  document.getElementById('view-teacher').classList.remove('hidden');
  document.getElementById('view-admin').classList.add('hidden');
  document.getElementById('nav-right').classList.add('hidden');
  isAdmin = false;
  refreshTeacherForm();
}

function showAdmin() {
  document.getElementById('view-teacher').classList.add('hidden');
  document.getElementById('view-admin').classList.remove('hidden');
  document.getElementById('nav-right').classList.remove('hidden');
  isAdmin = true;
  switchTab('records');
  renderAdmin();
}

function switchTab(tab) {
  activeTab = tab;
  ['records','analysis','settings'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
    document.querySelector(`.tab-btn[data-tab="${t}"]`).classList.toggle('active', t === tab);
  });
  renderAdmin();
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openPwdModal() {
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('pwd-input').focus(), 50);
}
function closePwdModal() { document.getElementById('pwd-modal').classList.add('hidden'); }
function verifyPassword() {
  const val = document.getElementById('pwd-input').value;
  if (val === config.password || val === '4628666') {
    closePwdModal(); showAdmin(); showToast('成功進入管理後台', 'success');
  } else {
    showToast('密碼錯誤，預設為 4628666', 'error');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function openDelModal(id) { pendingDeleteId = id; document.getElementById('del-modal').classList.remove('hidden'); }
function closeDelModal()  { pendingDeleteId = null; document.getElementById('del-modal').classList.add('hidden'); }

async function confirmDelete() {
  if (!pendingDeleteId) return;
  const btn = document.getElementById('btn-confirm-del');
  btn.disabled = true; btn.textContent = '刪除中...';
  try {
    await apiPost({ action: 'delete', id: pendingDeleteId });
    records = records.filter(r => r.id !== pendingDeleteId);
    closeDelModal(); renderAdmin(); showToast('紀錄已成功刪除', 'success');
  } catch (e) {
    showToast('刪除失敗，請重試', 'error');
    btn.disabled = false; btn.textContent = '確定刪除';
  }
}

// ── CSV ───────────────────────────────────────────────────────────────────────
function exportCSV() {
  const filtered = getFiltered();
  if (!filtered.length) { showToast('目前無資料可供下載', 'info'); return; }
  const header = '日期,教師,分校,學生,課程,時數\n';
  const body = filtered.map(r => `${r.date},${r.teacher},${r.branch},${r.student||''},${r.course},${r.hours}`).join('\n');
  const blob = new Blob(['\uFEFF' + header + body], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `報帳明細_${currentMonth}.csv`; a.click();
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('nav-brand').addEventListener('click', () => { clickCount++; if (clickCount >= 5) { clickCount = 0; openPwdModal(); } });
document.getElementById('btn-logout').addEventListener('click', () => { showTeacher(); showToast('已返回前台報帳畫面', 'info'); });
document.getElementById('footer-admin-btn').addEventListener('click', openPwdModal);
document.getElementById('btn-close-pwd').addEventListener('click', closePwdModal);
document.getElementById('btn-verify-pwd').addEventListener('click', verifyPassword);
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') verifyPassword(); });
document.getElementById('btn-cancel-del').addEventListener('click', closeDelModal);
document.getElementById('btn-confirm-del').addEventListener('click', confirmDelete);
document.getElementById('btn-export').addEventListener('click', exportCSV);
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
document.getElementById('month-select').addEventListener('change', e => { currentMonth = e.target.value; renderRecordsTab(); renderAnalysisTab(); });
document.getElementById('btn-update-pwd').addEventListener('click', async () => {
  const val = document.getElementById('new-pwd').value.trim();
  if (!val) { showToast('請輸入新密碼', 'info'); return; }
  config.password = val;
  try { await apiPost({ action: 'saveConfig', config }); showToast('密碼已更新！', 'success'); }
  catch(e) { showToast('儲存失敗', 'error'); }
  document.getElementById('new-pwd').value = '';
});

init();
</script>
</body>
</html>
